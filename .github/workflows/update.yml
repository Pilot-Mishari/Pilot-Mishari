name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests python-dateutil lxml

      - name: Run Update Script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ vars.USER_NAME }}
        run: python today.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # This ensures the cache folder and SVGs are all tracked
          git add dark_mode.svg light_mode.svg
          # Only add cache if it exists to avoid errors
          if [ -d "cache" ]; then git add cache/; fi
          
          git commit -m "Updated stats and uptime" || exit 0
          git push